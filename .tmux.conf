# --- General settings ---
set -g mouse on                    # Enable mouse support (scroll, select, resize)
set -g history-limit 100000        # Generous scrollback buffer
set -g set-clipboard on            # Allow tmux to set the system clipboard
set -g renumber-windows on         # Renumber windows when one is closed

set-option -g status-position bottom

# --- Status line ---
set -g status on
set -g status-interval 1
set -g status-style 'bg=colour235,fg=white'
set -g status-left '#[bold,bg=colour32,fg=white] #S  #[bg=colour235,fg=colour245] #H  #[default]#{?#{==:#(ifconfig | grep -q utun && echo 1 || echo 0),1},#[fg=green] VPN Active,#[fg=red] No VPN}  '
set -g status-left-length 200
set -g status-right '#{?#{>:#{client_width},150},#[bg=colour235#,fg=white] #[fg=green#,bold]SESSION #[bg=green#,fg=black] ^b #[bg=colour235#,fg=colour245]+ #[bg=green#,fg=black] d #[bg=colour235#,fg=white] Detach #[fg=colour240]│ #[bg=green#,fg=black] s #[bg=colour235#,fg=white] List #[fg=colour240]│ #[bg=green#,fg=black] a #[bg=colour235#,fg=white] New #[fg=colour240]│ #[bg=green#,fg=black] $ #[bg=colour235#,fg=white] Rename #[fg=colour240]│ #[bg=green#,fg=black] ( #[bg=colour235#,fg=white] Prev #[fg=colour240]│ #[bg=green#,fg=black] ) #[bg=colour235#,fg=white] Next #[fg=colour240]║ #[fg=magenta#,bold]PANE #[bg=magenta#,fg=white] ^b #[bg=colour235#,fg=colour245]+ #[bg=magenta#,fg=white] %%%% #[bg=colour235#,fg=white] VSplit #[fg=colour240]│ #[bg=magenta#,fg=white] " #[bg=colour235#,fg=white] HSplit #[fg=colour240]│ #[bg=magenta#,fg=white] x #[bg=colour235#,fg=white] Kill #[fg=colour240]│ #[bg=magenta#,fg=white] o #[bg=colour235#,fg=white] Next #[fg=colour240]│ #[bg=magenta#,fg=white] ←↓↑→ #[bg=colour235#,fg=white] Navigate,}'
set -g status-right-length 300
set -gu 'status-format[1]'

set -g window-status-format ''
set -g window-status-current-format ''


# --- Claude Code ---
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Copy-mode: yank to system clipboard (macOS)
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"


# --- Custom keybindings ---
# prefix + a: Create a new named session (prompts for name)
bind-key a command-prompt -p "New session name:" { new-session -d -s "%%" ; switch-client -t "%%" }
